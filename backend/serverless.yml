service: restaurant-ordering-api

frameworkVersion: '3'

plugins:
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 512
  timeout: 29
  environment:
    NODE_ENV: ${self:provider.stage}
    MONGODB_URI: ${env:MONGODB_URI, 'mongodb://admin:admin123@localhost:27017/sundevs?authSource=admin'}
    REDIS_HOST: ${env:REDIS_HOST, 'localhost'}
    REDIS_PORT: ${env:REDIS_PORT, '6379'}
    SERVICE_FEE_BASIS_POINTS: ${env:SERVICE_FEE_BASIS_POINTS, '500'}
    MAX_PAYLOAD_SIZE: ${env:MAX_PAYLOAD_SIZE, '16384'}

functions:
  api:
    handler: dist/lambda.handler
    events:
      - http:
          method: ANY
          path: /
      - http:
          method: ANY
          path: '{proxy+}'

custom:
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true
